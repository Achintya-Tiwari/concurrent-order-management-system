# ─────────────────────────────────────────────────────────────────────────────
# application.yml  –  Base / production configuration
#
# Environment-specific overrides live in application-dev.yml.
# Secrets (DB password, etc.) come from environment variables — never hardcoded here.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 8080
  servlet:
    context-path: /

spring:

  application:
    name: oms-backend

  # Active profile: set via SPRING_PROFILES_ACTIVE env var or --spring.profiles.active=dev
  # (not set here so production deployments don't accidentally pick up dev settings)

  # ── Datasource ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/order-management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: OmsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

# ── Springdoc OpenAPI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: alpha

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.psl.oms: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    # Phase 3: show async/scheduler activity at INFO so it's visible in production logs
    com.psl.oms.async: INFO
  pattern:
    # [timestamp] [thread-name] LEVEL logger - message
    # Thread name is critical for Phase 3 — it shows WHICH pool thread ran each task
    # e.g. "oms-async-1", "oms-concurrent-3", "scheduling-1"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── OMS application properties (Phase 3) ─────────────────────────────────────
oms:
  scheduler:
    delayed-orders:
      # Cron: "0 0 0 * * *" = midnight daily
      # Override per environment without recompiling:
      #   dev:  "0 * * * * *"  (every minute — easy to test)
      #   prod: "0 0 0 * * *"  (midnight daily)
      cron: "0 0 0 * * *"

  async:
    # Pool sizing documented here so ops teams know what to tune without reading code.
    # These values match AsyncConfig constants — a future Phase 4 can bind them via @ConfigurationProperties.
    bill-generator:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100
    concurrent-processor:
      pool-size: 4
